apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-java21-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-java21-demo
  template:
    metadata:
      labels:
        app: spring-java21-demo
    spec:
      containers:
        - name: spring-java21-demo
          image: test:1.0
          ports:
            - containerPort: 8080